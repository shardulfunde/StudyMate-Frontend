<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyMate Cron Heartbeat</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        border: 1px solid #cbd5e1;
        background: #ffffff;
        border-radius: 12px;
        padding: 18px 20px;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        max-width: 520px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.05rem;
      }
      p {
        margin: 0;
        color: #334155;
        font-size: 0.92rem;
        line-height: 1.5;
      }
      code {
        background: #f1f5f9;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>StudyMate Cron Heartbeat</h1>
      <p>
        This is a static page for cron pings. It does not require login and does not call any backend
        endpoint.
      </p>
      <p style="margin-top: 10px;">Ping URL path: <code>/cron-heartbeat.html</code></p>
    </div>
  </body>
</html>
